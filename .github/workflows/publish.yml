name: publish

# Publishes to PyPI when a GitHub Release is published (the same event Zenodo archives on,
# so cutting one Release both mints the DOI and ships the package).
# Uses PyPI Trusted Publishing (OIDC) — no API token stored in the repo.
# One-time setup: on https://pypi.org/manage/project/vaxtract/settings/publishing/
# register this repo + workflow (publish.yml) + environment "pypi" as a trusted publisher.
# `skip-existing` makes re-running on an already-uploaded version a no-op instead of a failure
# (so archiving the already-published 0.1.0 won't error).

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Check metadata
        run: |
          pip install twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
